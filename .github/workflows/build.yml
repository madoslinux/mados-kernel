name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            git \
            ccache \
            ncurses \
            clang \
            lld \
            llvm \
            binutils \
            libisl \
            m4 \
            file \
            texinfo \
            gawk

      - name: Build kernel package
        run: |
          set -e
          cd /tmp

          git clone --depth 1 --branch v6.19.10-zen1 https://github.com/zen-kernel/zen-kernel.git linux-src
          cd linux-src

          cp /home/runner/work/mados-kernel/mados-kernel/config .config
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-mados-zen"|g' .config
          sed -i 's|CONFIG_LOCALVERSION_AUTO=.*|CONFIG_LOCALVERSION_AUTO=n|g' .config
          yes | make olddefconfig 2>/dev/null || true

          make -j$(nproc) LLVM=1 CC=clang bzImage 2>&1 | tail -20

          kernver="$(make -s kernelrelease)"
          echo "Kernel version: ${kernver}"

          mkdir -p pkgdest/boot
          mkdir -p pkgdest/usr/lib/modules/${kernver}

          install -Dm644 arch/x86/boot/bzImage pkgdest/boot/vmlinuz-linux-mados-zen
          make INSTALL_MOD_PATH=pkgdest modules_install
          install -Dm644 System.map pkgdest/boot/System.map-linux-mados-zen
          install -Dm644 .config pkgdest/boot/config-linux-mados-zen
          echo "${kernver}" > pkgdest/usr/lib/modules/${kernver}/kernel

          cd /tmp
          tar -cvJf linux-mados-zen-6.19.10-zen1-x86_64.pkg.tar.xz -C linux-src .config System.map arch/x86/boot/bzImage
          tar -cvJf linux-mados-zen-6.19.10-zen1-x86_64.pkg.tar.xz pkgdest/boot pkgdest/usr

          ls -lh /tmp/linux-mados-zen-*.pkg.tar.xz

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
          tag_name: ${{ github.ref }}
          name: madOS Kernel ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-package
          path: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
