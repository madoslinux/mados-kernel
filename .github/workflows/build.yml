name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            git \
            ccache \
            ncurses \
            curl \
            clang \
            lld \
            llvm \
            binutils

      - name: Clone zen-kernel source
        run: |
          git clone --depth 1 --branch v6.19.10-zen1 https://github.com/zen-kernel/zen-kernel.git /tmp/linux
          cd /tmp/linux
          pwd && ls -la

      - name: Configure kernel
        run: |
          cd /tmp/linux
          cp "${GITHUB_WORKSPACE}/config" .config
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-mados-zen"|g' .config
          sed -i 's|CONFIG_LOCALVERSION_AUTO=.*|CONFIG_LOCALVERSION_AUTO=n|g' .config
          yes | make olddefconfig 2>/dev/null || true

      - name: Build kernel
        run: |
          cd /tmp/linux
          make -j$(nproc) LLVM=1 CC=clang bzImage 2>&1 | tail -100

      - name: Create package
        run: |
          cd /tmp/linux
          kernver="$(make -s kernelrelease)"
          echo "Kernel version: ${kernver}"
          
          mkdir -p /tmp/pkgdir/boot
          mkdir -p "/tmp/pkgdir/usr/lib/modules/${kernver}"
          
          install -Dm644 arch/x86/boot/bzImage /tmp/pkgdir/boot/vmlinuz-linux-mados-zen
          make INSTALL_MOD_PATH=/tmp/pkgdir modules_install
          install -Dm644 System.map /tmp/pkgdir/boot/System.map-linux-mados-zen
          install -Dm644 .config /tmp/pkgdir/boot/config-linux-mados-zen
          echo "${kernver}" > "/tmp/pkgdir/usr/lib/modules/${kernver}/kernel"

      - name: Create tarball
        run: |
          cd /tmp/pkgdir
          tar -cvJf /tmp/linux-mados-zen-6.19.10-zen1-x86_64.pkg.tar.xz *
          ls -lh /tmp/linux-mados-zen-*.pkg.tar.xz

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
          tag_name: ${{ github.ref }}
          release_name: madOS Kernel ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-package
          path: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
