name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            git \
            ccache \
            ncurses \
            clang \
            lld \
            llvm \
            binutils

      - name: Clone zen-kernel source
        run: |
          git clone --depth=1 --branch v6.19.10-zen1 https://github.com/zen-kernel/zen-kernel.git /tmp/linux
          cd /tmp/linux
          pwd && ls -la

      - name: Configure kernel
        run: |
          cd /tmp/linux
          make x86_64_defconfig
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-mados-zen"|g' .config
          sed -i 's|CONFIG_LOCALVERSION_AUTO=.*|CONFIG_LOCALVERSION_AUTO=n|g' .config
          sed -i 's|^CONFIG_DEBUG_INFO=.*|CONFIG_DEBUG_INFO=n|g' .config

          # Enable common network drivers as built-in (not modules)
          sed -i 's|^CONFIG_R8169=m|CONFIG_R8169=y|g' .config
          sed -i 's|^CONFIG_E1000=m|CONFIG_E1000=y|g' .config
          sed -i 's|^CONFIG_E1000E=m|CONFIG_E1000E=y|g' .config
          sed -i 's|^CONFIG_IGB=m|CONFIG_IGB=y|g' .config
          sed -i 's|^CONFIG_IXGBE=m|CONFIG_IXGBE=y|g' .config
          sed -i 's|^CONFIG_VIRTIO_NET=m|CONFIG_VIRTIO_NET=y|g' .config
          sed -i 's|^CONFIG_VIRTIO_PCI=m|CONFIG_VIRTIO_PCI=y|g' .config
          sed -i 's|^CONFIG_USB_NET=m|CONFIG_USB_NET=y|g' .config
          sed -i 's|^CONFIG_USB_RTL8150=m|CONFIG_USB_RTL8150=y|g' .config
          sed -i 's|^CONFIG_USB_RTL8152=m|CONFIG_USB_RTL8152=y|g' .config
          sed -i 's|^CONFIG_USB_NET_DRIVERS=m|CONFIG_USB_NET_DRIVERS=y|g' .config

          # Enable ZRAM as built-in (check for uncommented line)
          if ! grep -q "^CONFIG_ZRAM=" .config; then
              echo "CONFIG_ZRAM=y" >> .config
          else
              sed -i 's|^CONFIG_ZRAM=m|CONFIG_ZRAM=y|g' .config
          fi

          # Enable overlay FS (for Docker/containers) and its dependencies
          if ! grep -q "^CONFIG_OVERLAY_FS=" .config; then
              echo "CONFIG_OVERLAY_FS=y" >> .config
          else
              sed -i 's|^CONFIG_OVERLAY_FS=m|CONFIG_OVERLAY_FS=y|g' .config
          fi

          # Add SQUASHFS and filesystem support if not present (needed for live boot)
          if ! grep -q "^CONFIG_SQUASHFS=" .config; then
              echo "CONFIG_SQUASHFS=y" >> .config
              echo "CONFIG_SQUASHFS_DECOMP_MULTI=y" >> .config
              echo "CONFIG_SQUASHFS_CHOICE_DECOMPRESS=y" >> .config
              echo "CONFIG_XZ_DECOMPRESS=y" >> .config
              echo "CONFIG_ISO9660_FS=y" >> .config
              echo "CONFIG_JOLIET=y" >> .config
              echo "CONFIG_SQUASHFS_ZSTD=y" >> .config
          else
              sed -i 's|^CONFIG_SQUASHFS=.*|CONFIG_SQUASHFS=y|g' .config
              sed -i 's|^CONFIG_SQUASHFS_FILE_CACHE=.*|CONFIG_SQUASHFS_FILE_CACHE=y|g' .config
              sed -i 's|^CONFIG_SQUASHFS_DECOMP_MULTI=.*|CONFIG_SQUASHFS_DECOMP_MULTI=y|g' .config
              sed -i 's|^CONFIG_SQUASHFS_CHOICE_DECOMPRESS=.*|CONFIG_SQUASHFS_CHOICE_DECOMPRESS=y|g' .config
              sed -i 's|^CONFIG_XZ_DECOMPRESS=.*|CONFIG_XZ_DECOMPRESS=y|g' .config
              sed -i 's|^CONFIG_ISO9660_FS=.*|CONFIG_ISO9660_FS=y|g' .config
              sed -i 's|^CONFIG_JOLIET=.*|CONFIG_JOLIET=y|g' .config
              sed -i 's|^CONFIG_SQUASHFS_ZSTD=.*|CONFIG_SQUASHFS_ZSTD=y|g' .config
          fi

          # Enable Btrfs for installer (subvolumes, snapshots)
          if ! grep -q "^CONFIG_BTRFS_FS=" .config; then
              echo "CONFIG_BTRFS_FS=y" >> .config
              echo "CONFIG_BTRFS_FS_POSIX_ACL=y" >> .config
              echo "CONFIG_BTRFS_DEBUG=y" >> .config
          else
              sed -i 's|^CONFIG_BTRFS_FS=.*|CONFIG_BTRFS_FS=y|g' .config
          fi

          make olddefconfig

      - name: Build kernel
        run: |
          cd /tmp/linux
          make -j$(nproc) LLVM=1 CC=clang bzImage modules 2>&1 | tail -100

      - name: Create kernel package
        run: |
          cd /tmp/linux
          kernver="$(make -s kernelrelease)"
          echo "Kernel version: ${kernver}"

          mkdir -p /tmp/pkgdir/boot
          mkdir -p "/tmp/pkgdir/usr/lib/modules/${kernver}"

          install -Dm644 arch/x86/boot/bzImage /tmp/pkgdir/boot/vmlinuz-linux-mados-zen
          make INSTALL_MOD_PATH=/tmp/pkgdir modules_install
          install -Dm644 System.map /tmp/pkgdir/boot/System.map-linux-mados-zen
          install -Dm644 .config /tmp/pkgdir/boot/config-linux-mados-zen
          echo "${kernver}" > "/tmp/pkgdir/usr/lib/modules/${kernver}/kernel"

      - name: Create kernel tarball
        run: |
          cd /tmp/pkgdir
          tar -cvJf /tmp/linux-mados-zen-6.19.10-zen1-x86_64.pkg.tar.xz *
          ls -lh /tmp/linux-mados-zen-*.pkg.tar.xz

      - name: Create headers package
        run: |
          cd /tmp/linux
          kernver="$(make -s kernelrelease)"
          echo "Creating headers for version: ${kernver}"

          mkdir -p /tmp/headersdir/usr/lib/modules/${kernver}
          mkdir -p /tmp/headersdir/usr/src/

          # Copy headers source tree (create parent dirs first)
          mkdir -p /tmp/headersdir/usr/src/linux-${kernver}
          cp -r include /tmp/headersdir/usr/src/linux-${kernver}/

          mkdir -p /tmp/headersdir/usr/src/linux-${kernver}/arch/x86
          cp -r arch/x86/include /tmp/headersdir/usr/src/linux-${kernver}/arch/x86/ 2>/dev/null || true

          cp -r scripts /tmp/headersdir/usr/src/linux-${kernver}/

          # Copy build files
          cp Makefile /tmp/headersdir/usr/src/linux-${kernver}/ 2>/dev/null || true
          cp Module.symvers /tmp/headersdir/usr/src/linux-${kernver}/ 2>/dev/null || true

          # Install generated headers and config
          install -Dm644 .config /tmp/headersdir/usr/src/linux-${kernver}/.config
          install -Dm644 System.map /tmp/headersdir/usr/src/linux-${kernver}/System.map

          # Create build symlink for kernel module compilation
          ln -s /usr/src/linux-${kernver} /tmp/headersdir/usr/lib/modules/${kernver}/build

      - name: Create headers tarball
        run: |
          cd /tmp/headersdir
          tar -cvJf /tmp/linux-mados-zen-headers-6.19.10-zen1-x86_64.pkg.tar.xz *
          ls -lh /tmp/linux-mados-zen-headers-*.pkg.tar.xz

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
            /tmp/linux-mados-zen-headers-*.pkg.tar.xz
          tag_name: ${{ github.ref }}
          name: madOS Kernel ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-packages
          path: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
            /tmp/linux-mados-zen-headers-*.pkg.tar.xz
