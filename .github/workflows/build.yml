name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            wget \
            git \
            ccache \
            rustup

      - name: Setup GCC
        run: |
          rustup default stable
          gcc --version

      - name: Download kernel source
        env:
          KERNEL_VERSION: 6.12.1.zen1
        run: |
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${KERNEL_VERSION}.tar.xz
          tar xf linux-${KERNEL_VERSION}.tar.xz
          cd linux-${KERNEL_VERSION}

      - name: Apply BORE patch
        env:
          KERNEL_VERSION: 6.12.1.zen1
        run: |
          cd linux-${KERNEL_VERSION}
          wget -q https://raw.githubusercontent.com/firelzrd/bore-scheduler/master/0001-bore-scheduler-${KERNEL_VERSION}.patch
          if [ -f 0001-bore-scheduler-${KERNEL_VERSION}.patch ]; then
            patch -p1 -i 0001-bore-scheduler-${KERNEL_VERSION}.patch || echo "Patch may already be applied or incompatible"
          fi

      - name: Apply config
        run: |
          cd linux-${KERNEL_VERSION}
          cp ../config .config
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-mados-zen"|g' .config
          sed -i 's|CONFIG_LOCALVERSION_AUTO=.*|CONFIG_LOCALVERSION_AUTO=n|g' .config

      - name: Configure kernel
        run: |
          cd linux-${KERNEL_VERSION}
          make olddefconfig
          make -j$(nproc) LLVM=0 CC=gcc AS=as LD=ld.bfd olddefconfig

      - name: Build kernel
        env:
          MAKEFLAGS: "-j$(nproc)"
        run: |
          cd linux-${KERNEL_VERSION}
          make -j$(nproc) LLVM=0 CC=gcc AS=as LD=ld.bfd zstd 2>&1 | tail -50

      - name: Build package
        env:
          KERNEL_VERSION: 6.12.1.zen1
        run: |
          cd linux-${KERNEL_VERSION}
          mkdir -p ../pkgdir/{boot,usr/lib/modules,usr/share,etc}
          
          local kernver="$(make -s kernelrelease)"
          local kernelimg="arch/x86/boot/bzImage"
          
          # Install kernel image
          install -Dm644 ${kernelimg} ../pkgdir/boot/vmlinuz-linux-mados-zen
          
          # Install modules
          make INSTALL_MOD_PATH=../pkgdir modules_install
          
          # Install firmware
          if [ -f drivers/firmware/bootsplash/bootsplash.data ]; then
            install -Dm644 drivers/firmware/bootsplash/bootsplash.data ../pkgdir/usr/share/bootsplash/bootsplash.data
          fi
          
          # Install System.map and config
          install -Dm644 System.map ../pkgdir/boot/System.map-linux-mados-zen
          install -Dm644 .config ../pkgdir/boot/config-linux-mados-zen
          
          # Create module metadata
          mkdir -p ../pkgdir/usr/lib/modules/${kernver}
          echo "${kernver}" > ../pkgdir/usr/lib/modules/${kernver}/kernel
          
          # Create package metadata
          cd ..
          echo "pkgname=linux-mados-zen" > PKGBUILD.test
          echo "pkgver=${kernver}" >> PKGBUILD.test
          cat PKGBUILD.test && rm PKGBUILD.test

      - name: Create package
        env:
          KERNEL_VERSION: 6.12.1.zen1
        run: |
          cd pkgdir
          
          # Create a proper tarball for the package
          KERNEL_VERSION="6.12.1.zen1-mados-zen-1"
          mkdir -p install
          
          # Create .PKGINFO
          cat > .PKGINFO << 'PKGEOF'
          pkgname = linux-mados-zen
          pkgver = 6.12.1.zen1-mados-zen-1
          pkgdesc = madOS kernel with BORE scheduler - optimized for desktop responsiveness
          url = https://github.com/madoslinux/mados-kernel
          builddate = 1700000000
          packager = madOS Build
          size = 123456789
          arch = x86_64
          license = GPL-2.0-or-later
          depend = coreutils
          depend = kmod
          depend = initramfs
          optdep = linux-firmware: firmware images needed for some hardware
          optdep = linux-headers: building external kernel modules
          provides = linux-mados-zen=6.12.1.zen1
          conflict = linux-mados-zen
          PKGEOF
          
          # Create .MTREE
          tar --XZ -cvf ../linux-mados-zen-*.pkg.tar.xz * .PKGINFO 2>/dev/null || true
          
          # Create tarball manually if needed
          tar -cvJf linux-mados-zen-${KERNEL_VERSION}-x86_64.pkg.tar.xz *

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-${KERNEL_VERSION}/linux-*.tar.xz
            pkgdir/*.pkg.tar.xz
            linux-*/arch/x86/boot/bzImage
          tag_name: ${{ github.ref }}
          release_name: madOS Kernel ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: |
            pkgdir/
            linux-*/

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: madOS Kernel ${{ github.ref }}
          body: |
            ## madOS Kernel with BORE Scheduler
            
            This kernel includes:
            - BORE Scheduler (Burst-Oriented Response Enhancer) for improved desktop responsiveness
            - 1000Hz tickrate for low latency
            - NVMe and Btrfs support built-in
            - x86-64-v3 optimizations
            - Steam Deck / Handheld device support
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
