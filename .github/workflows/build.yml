name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            git \
            ccache \
            ncurses

      - name: Clone zen-kernel source
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          git clone --depth 1 --branch v${KERNEL_VERSION} https://github.com/zen-kernel/zen-kernel.git linux-${KERNEL_VERSION}
          cd linux-${KERNEL_VERSION}
          ls -la

      - name: Download BORE patch
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          cd linux-${KERNEL_VERSION}
          wget -q "https://raw.githubusercontent.com/firelzrd/bore-scheduler/master/0001-bore-scheduler-${KERNEL_VERSION}.patch" \
            -O bore.patch || true
          ls -la *.patch 2>/dev/null || echo "No patch found"

      - name: Apply BORE patch
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          cd linux-${KERNEL_VERSION}
          if [ -f bore.patch ]; then
            patch -p1 -i bore.patch || echo "Patch may already be applied or incompatible"
          fi

      - name: Apply config
        run: |
          cd linux-${KERNEL_VERSION}
          cp ../config .config
          sed -i 's|CONFIG_LOCALVERSION=.*|CONFIG_LOCALVERSION="-mados-zen"|g' .config
          sed -i 's|CONFIG_LOCALVERSION_AUTO=.*|CONFIG_LOCALVERSION_AUTO=n|g' .config

      - name: Configure kernel
        run: |
          cd linux-${KERNEL_VERSION}
          make olddefconfig

      - name: Build kernel
        env:
          MAKEFLAGS: "-j$(nproc)"
        run: |
          cd linux-${KERNEL_VERSION}
          make -j$(nproc) LLVM=0 CC=gcc AS=as LD=ld.bfd zstd 2>&1 | tail -100

      - name: Create package directories
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          cd linux-${KERNEL_VERSION}
          mkdir -p /tmp/pkgdir/boot
          mkdir -p /tmp/pkgdir/usr/lib/modules/$(make -s kernelrelease)

      - name: Install kernel
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          cd linux-${KERNEL_VERSION}
          local kernver="$(make -s kernelrelease)"
          
          # Install kernel image
          install -Dm644 arch/x86/boot/bzImage /tmp/pkgdir/boot/vmlinuz-linux-mados-zen
          
          # Install modules
          make INSTALL_MOD_PATH=/tmp/pkgdir modules_install
          
          # Install System.map and config
          install -Dm644 System.map /tmp/pkgdir/boot/System.map-linux-mados-zen
          install -Dm644 .config /tmp/pkgdir/boot/config-linux-mados-zen
          
          # Create kernel release file
          echo "${kernver}" > /tmp/pkgdir/usr/lib/modules/${kernver}/kernel
          
          ls -la /tmp/pkgdir/boot/
          ls -la /tmp/pkgdir/usr/lib/modules/

      - name: Create tarball
        env:
          KERNEL_VERSION: 6.19.10-zen1
        run: |
          cd /tmp/pkgdir
          tar -cvJf /tmp/linux-mados-zen-${KERNEL_VERSION}-x86_64.pkg.tar.xz *
          ls -lh /tmp/linux-mados-zen-*.pkg.tar.xz

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
          tag_name: ${{ github.ref }}
          release_name: madOS Kernel ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-package
          path: |
            /tmp/linux-mados-zen-*.pkg.tar.xz
