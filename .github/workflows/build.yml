name: Build Kernel

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            cpio \
            gettext \
            libelf \
            pahole \
            perl \
            python \
            tar \
            xz \
            zstd \
            git \
            ccache \
            ncurses \
            clang \
            lld \
            llvm \
            binutils

      - name: Create non-root build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build packages with makepkg
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg -s --noconfirm"

      - name: Validate key config symbols
        run: |
          set -eu
          compat_cfg="src/build-compat/.config"
          perf_cfg="src/build-perf/.config"

          if [ ! -f "$compat_cfg" ] || [ ! -f "$perf_cfg" ]; then
            echo "Could not find generated configs under src/build-*"
            exit 1
          fi

          check_cfg() {
            cfg="$1"
            pattern="$2"
            message="$3"
            if ! grep -Eq "$pattern" "$cfg"; then
              echo "Validation failed: $message"
              echo "Pattern: $pattern"
              echo "Config: $cfg"
              exit 1
            fi
          }

          # Compatibility flavor: avoid native tuning, keep Plymouth/early graphics path.
          check_cfg "$compat_cfg" '^# CONFIG_MNATIVE_INTEL is not set$' 'CONFIG_MNATIVE_INTEL must be disabled in compat flavor'
          check_cfg "$compat_cfg" '^# CONFIG_MNATIVE_AMD is not set$' 'CONFIG_MNATIVE_AMD must be disabled in compat flavor'
          check_cfg "$compat_cfg" '^CONFIG_DRM_SIMPLEDRM=y$' 'CONFIG_DRM_SIMPLEDRM must be enabled in compat flavor'
          check_cfg "$compat_cfg" '^CONFIG_FRAMEBUFFER_CONSOLE=y$' 'CONFIG_FRAMEBUFFER_CONSOLE must be enabled in compat flavor'

          # Perf flavor: ensure modern baseline selection exists + Plymouth path.
          check_cfg "$perf_cfg" '^CONFIG_GENERIC_CPU3=y$' 'CONFIG_GENERIC_CPU3 must be enabled in perf flavor'
          check_cfg "$perf_cfg" '^CONFIG_DRM_SIMPLEDRM=y$' 'CONFIG_DRM_SIMPLEDRM must be enabled in perf flavor'

      - name: Collect output packages
        run: |
          mkdir -p /tmp/artifacts
          cp -v ./*.pkg.tar.* /tmp/artifacts/
          cp -v src/build-compat/arch/x86/boot/bzImage /tmp/artifacts/bzImage-linux-mados
          ls -lh /tmp/artifacts

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/artifacts/*.pkg.tar.*
          tag_name: ${{ github.ref_name }}
          name: madOS Kernel ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-packages
          path: /tmp/artifacts/*

  qemu-smoke:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf busybox-static cpio

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: kernel-packages
          path: /tmp/artifacts

      - name: Build tiny initramfs for smoke boot
        run: |
          set -eu
          mkdir -p /tmp/initramfs/{bin,dev,proc,sys}
          cp /bin/busybox /tmp/initramfs/bin/busybox
          ln -sf /bin/busybox /tmp/initramfs/bin/sh
          ln -sf /bin/busybox /tmp/initramfs/bin/mount
          ln -sf /bin/busybox /tmp/initramfs/bin/poweroff

          cat > /tmp/initramfs/init <<'EOF'
          #!/bin/sh
          mount -t proc proc /proc
          mount -t sysfs sys /sys
          mount -t devtmpfs devtmpfs /dev
          echo "SMOKE_OK: kernel booted and initramfs ran"
          poweroff -f
          exec sh
          EOF

          chmod +x /tmp/initramfs/init
          (cd /tmp/initramfs && find . -print0 | cpio --null -ov --format=newc | gzip -9) > /tmp/initramfs.cpio.gz

      - name: Smoke boot test (BIOS)
        run: |
          set -eu
          timeout 120s qemu-system-x86_64 \
            -kernel /tmp/artifacts/bzImage-linux-mados \
            -initrd /tmp/initramfs.cpio.gz \
            -append "console=ttyS0 rdinit=/init loglevel=7" \
            -nographic -no-reboot -m 1024 -smp 2 \
            2>&1 | tee /tmp/qemu-bios.log

          grep -q "SMOKE_OK: kernel booted and initramfs ran" /tmp/qemu-bios.log

      - name: Smoke boot test (UEFI)
        run: |
          set -eu
          timeout 120s qemu-system-x86_64 \
            -bios /usr/share/OVMF/OVMF_CODE.fd \
            -kernel /tmp/artifacts/bzImage-linux-mados \
            -initrd /tmp/initramfs.cpio.gz \
            -append "console=ttyS0 rdinit=/init loglevel=7" \
            -nographic -no-reboot -m 1024 -smp 2 \
            2>&1 | tee /tmp/qemu-uefi.log

          grep -q "SMOKE_OK: kernel booted and initramfs ran" /tmp/qemu-uefi.log
